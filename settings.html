<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模型设置 | 大乐透 AI 预测</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="template/css/style.css?v=20260312a">
</head>
<body class="settings-body">
    <div class="settings-shell">
        <nav class="navbar settings-navbar">
            <div class="navbar-container">
                <div class="navbar-content">
                    <div class="navbar-brand">
                        <div class="navbar-logo">AI</div>
                        <div class="navbar-title-wrapper">
                            <span class="navbar-title">模型<span class="highlight">设置</span></span>
                            <span class="navbar-subtitle">Model Control Center</span>
                        </div>
                    </div>
                    <div class="nav-items">
                        <a class="nav-item nav-page-link" href="index.html">大乐透</a>
                        <a class="nav-item nav-page-link active-page" href="settings.html">设置</a>
                    </div>
                </div>
            </div>
        </nav>

        <main class="settings-main">
            <section class="settings-hero">
                <div>
                    <p class="settings-eyebrow">Runtime Configuration</p>
                    <h1>统一管理模型、密钥与连接配置</h1>
                    <p class="settings-description">修改会直接写入数据库，预测脚本和接口会读取这里的最新配置。</p>
                </div>
                <div class="settings-toolbar">
                    <label class="settings-toggle">
                        <input id="showDeletedToggle" type="checkbox">
                        <span>显示已删除模型</span>
                    </label>
                    <button id="newModelButton" class="settings-primary-button" type="button">新增模型</button>
                </div>
            </section>

            <section class="settings-layout">
                <aside class="settings-panel settings-list-panel">
                    <div class="settings-panel-header">
                        <div>
                            <h2>模型列表</h2>
                            <p id="settingsListSummary">加载中...</p>
                        </div>
                    </div>
                    <div id="settingsMessage" class="settings-message" hidden></div>
                    <div id="modelList" class="settings-model-list"></div>
                </aside>
            </section>
        </main>
    </div>

    <div id="editorModal" class="settings-modal" hidden>
        <div id="editorBackdrop" class="settings-modal-backdrop"></div>
        <section class="settings-modal-panel">
            <div class="settings-panel-header settings-modal-header">
                <div>
                    <h2 id="editorTitle">新增模型</h2>
                    <p id="editorSubtitle">填写模型基本信息和连接参数。</p>
                </div>
                <button id="closeEditorButton" class="settings-modal-close" type="button" aria-label="关闭">×</button>
            </div>

            <form id="modelForm" class="settings-form">
                <div class="settings-grid">
                    <label class="settings-field">
                        <span>模型编码</span>
                        <input id="fieldModelCode" name="model_code" type="text" placeholder="例如 claude-sonnet-4.6" required>
                    </label>
                    <label class="settings-field">
                        <span>显示名称</span>
                        <input id="fieldDisplayName" name="display_name" type="text" placeholder="例如 Claude-4.6" required>
                    </label>
                    <label class="settings-field">
                        <span>Provider</span>
                        <select id="fieldProvider" name="provider" required></select>
                    </label>
                    <label class="settings-field">
                        <span>API Model</span>
                        <input id="fieldApiModelName" name="api_model_name" type="text" placeholder="例如 claude-sonnet-4-6" required>
                    </label>
                    <label class="settings-field">
                        <span>版本</span>
                        <input id="fieldVersion" name="version" type="text" placeholder="可选">
                    </label>
                    <label class="settings-field">
                        <span>Temperature</span>
                        <input id="fieldTemperature" name="temperature" type="number" step="0.1" placeholder="可选">
                    </label>
                </div>

                <label class="settings-field">
                    <span>标签</span>
                    <input id="fieldTags" name="tags" type="text" placeholder="用英文逗号分隔，例如 reasoning,fast">
                </label>

                <label class="settings-field">
                    <span>Base URL</span>
                    <input id="fieldBaseUrl" name="base_url" type="url" placeholder="https://...">
                </label>

                <div class="settings-grid settings-grid-tight">
                    <label class="settings-field">
                        <span>API Key</span>
                        <input id="fieldApiKey" name="api_key" type="text" placeholder="直接存数据库">
                    </label>
                    <label class="settings-field">
                        <span>APP Code</span>
                        <input id="fieldAppCode" name="app_code" type="text" placeholder="可选">
                    </label>
                </div>

                <label class="settings-checkbox">
                    <input id="fieldIsActive" name="is_active" type="checkbox" checked>
                    <span>启用该模型参与预测</span>
                </label>

                <div class="settings-form-actions">
                    <button id="saveButton" class="settings-primary-button" type="submit">保存模型</button>
                    <button id="toggleStatusButton" class="settings-secondary-button" type="button" hidden>切换启用状态</button>
                    <button id="restoreButton" class="settings-secondary-button" type="button" hidden>恢复模型</button>
                    <button id="deleteButton" class="settings-danger-button" type="button" hidden>删除模型</button>
                </div>
            </form>
        </section>
    </div>

    <script src="template/js/settings_app.js?v=20260312a"></script>
</body>
</html>
